models:
  - name: dim_listings_cleansed
    description: "This table contains the cleansed listing data for Airbnb listings."
    data_tests:
      - minimum_row_count:
          arguments:
            min_rows: 1000

    columns:
      - name: listing_id
        description: "The primary identifier for each listing."
        data_tests:
          - not_null
          - unique

      - name: host_id
        description: "The identifier for the host of each listing."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        description: "The type of room available for booking."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  [
                    "Entire home/apt",
                    "Private room",
                    "Shared room",
                    "Hotel room",
                  ]
      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
          - positive_values

  - name: dim_hosts_cleansed
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        data_type: integer
      - name: host_name
        data_type: string
      - name: is_superhost
        data_type: string
      - name: updated_at
        data_type: timestamp
      - name: created_at
        data_type: timestamp
